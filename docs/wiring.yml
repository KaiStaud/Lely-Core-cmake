connectors:
  CN9:
    type: PinHeader
    subtype: female
    pinlabels: [SPI3_SCK, SPI3_MISO, SPI3_MOSI, CS, GND, VCC]
  FRAM:
    type: PinHeader
    subtype: male
    pinlabels: [VIN, 3V3, GND, SCK, MISO, MOSI, CS, nWP ,nHOLD]
  CN10:
    type: PinHeader
    subtype: male
    pinlabels: [TXC, RXC, SCL, SDA, VCC, GND]
  QWIIC: 
    type: JST
    subtype: female
    pinlabels: [GND,VCC, SDA, SCL]
  CAN:
    type: PinHeader
    subtype: female
    pinlabels: [TXC,RXC,GND,VCC]
  BOOST:
    type: ScrewTerminal
    pinlabels: [VIN,GND1,12V,GND2]
  STEPPER:
    type: ScrewTerminal
    pinlabels: [12V,GND,A+,A-,B+,B-]

cables:
  W1:
    gauge: 0.25 mm2
    length: 0.2
    color_code: DIN
    wirecount: 6
    shield: true
  W2:
    gauge: 0.25 mm2
    length: 0.2
    wirecount: 4
    shield: false
    colors: [BK, RD, BU,YE]
    category: bundle
  W3:
    gauge: 0.25 mm2
    length: 0.2
    wirecount: 4
    shield: false
    colors: [GN, YE, BU,RD]
connections:
# FRAM Bundle
  -
    - CN9: [1,2,3,4,5,6]
    - W1: [1,2,3,4,5,6]
    - FRAM: [1,3,4,5,6,7]

# QWIIC Bundles
  -
    - CN10: [6,5,4,3] 
    - W2: [1,2,3,4]
    - QWIIC: [1,2,3,4]

# FDCAN Connections
  -
    - CN10: [1,2,6,5]
    - W3: [1,2,3,4]
    - CAN: [1,2,3,4]
  # GND auf Schirm legen
  -
    - CN9: 5
    - W1: s